<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/styles.css">
    <title>Detalles</title>
    <!--
    Archivo: detalle.html
    Descripción: Muestra información detallada de un destino seleccionado.
    Incluye descripción, transporte y opciones de reserva.

    Autor: Equipo de desarrollo
    -->
</head>
<body>
<div class="container">
    <!-- IMAGEN DEL DESTINO -->
    <img id="imagen" alt="Imagen del destino turístico" class="imagen-destino">

    <!-- TÍTULO Y DESCRIPCIÓN -->
    <h1 id="titulo"></h1>

    <p class="descripcion" id="descripcionGeneral"></p>

    <!-- INFORMACIÓN DEL VIAJE -->
    <div class="info-viaje">
        <p><strong>Destino:</strong> <span id="destino"></span></p>
        <p><strong>Provincia:</strong> <span id="provincia"></span></p>
        <p><strong>Precio:</strong> <span id="precio"></span></p>
        <p><strong>Días:</strong> <span id="dias"></span></p>
        <p><strong>Modalidad de Transporte:</strong> <span id="transporte"></span></p>

    </div>

    <!-- BOTÓN PARA ABRIR EL FORMULARIO -->
    <button class="boton-reservar" onclick="abrirFormulario()">Reservar Ahora</button>
</div>

<!-- MODAL CON EL FORMULARIO -->
<div id="modalFormulario" class="modal">
    <div class="modal-content">
        <span class="cerrar" onclick="cerrarFormulario()">&times;</span>

        <h2>Formulario de Reserva</h2>

        <form class="formulario" onsubmit="guardarReserva(event)">
            <label for="nombre">Nombre Completo:</label>
            <input type="text" id="nombre" name="nombre" required>

            <label for="email">Correo Electrónico:</label>
            <input type="email" id="email" name="email" required>

            <label for="telefono">Teléfono:</label>
            <input type="tel" id="telefono" name="telefono" required>

            <label for="fecha">Fecha de Viaje:</label>
            <input type="date" id="fecha" name="fecha" required>

            <label for="personas">Número de Personas:</label>
            <input type="number" id="personas" name="personas" min="1" required>

            <label for="notas">Notas Adicionales:</label>
            <textarea id="notas" name="notas" rows="4" placeholder="Cuéntanos si tienes alguna solicitud especial..."></textarea>

            <div class="botones-form">
                <button type="submit" class="btn-enviar">Enviar Reserva</button>
                <button type="button" class="btn-cancelar" onclick="cerrarFormulario()">Cancelar</button>
            </div>
        </form>
    </div>
</div>

<!-- SCRIPT PARA ABRIR/CERRAR EL MODAL -->
<script src="js/data.js"></script>
<script>
    const id = localStorage.getItem("paqueteId");
    const paquete = paquetes.find(p => p.id == id);

    if (paquete) {
        document.getElementById("imagen").src = paquete.imagen;

        document.getElementById("titulo").textContent = paquete.destino;

        document.getElementById("descripcionGeneral").textContent =
            "Descubre " + paquete.destino + ", ubicado en " + paquete.provincia +
            ". " + paquete.descripcion;

        document.getElementById("destino").textContent = paquete.destino;
        document.getElementById("provincia").textContent = paquete.provincia;
        document.getElementById("precio").textContent = "$" + paquete.precio;
        document.getElementById("dias").textContent = paquete.dias + " días";
        document.getElementById("transporte").textContent = paquete.transporte.join(", ");
        document.getElementById("descripcion").textContent = paquete.descripcion;

    } else {
        alert("Error cargando el paquete ");
    }
</script>
<script>
    function abrirFormulario() {
        document.getElementById("modalFormulario").style.display = "flex";
    }

    function cerrarFormulario() {
        document.getElementById("modalFormulario").style.display = "none";
    }

    // Cerrar el modal si haces clic fuera de él
    window.onclick = function(event) {
        let modal = document.getElementById("modalFormulario");
        if (event.target == modal) {
            modal.style.display = "none";
        }
    }
</script>
<script>
    function guardarReserva(e) {
        e.preventDefault();

        const reserva = {
            nombre: document.getElementById("nombre").value,
            email: document.getElementById("email").value,
            telefono: document.getElementById("telefono").value,
            fecha: document.getElementById("fecha").value,
            personas: document.getElementById("personas").value,
            notas: document.getElementById("notas").value,
            destino: document.getElementById("destino").textContent
        };

        // obtener reservas existentes
        let reservas = JSON.parse(localStorage.getItem("reservas")) || [];

        // agregar nueva
        reservas.push(reserva);

        // guardar
        localStorage.setItem("reservas", JSON.stringify(reservas));

        alert("Reserva guardada ✅");
        // LIMPIAR FORMULARIO
        document.querySelector(".formulario").reset();

        cerrarFormulario();
    }
</script>
</body>
</html>
